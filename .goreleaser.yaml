version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - main: ./...
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
      - amd64
      - "386"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

changelog:
  sort: asc
  use: github
  abbrev: 7
  format: "* {{ .SHA }} {{ .Message }}{{ if .Logins }} ({{ .Logins | englishJoin }}){{ end }}"
  groups:
    - title: "✨ Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+'
      order: 1
    - title: "⚡ Performance"
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+'
      order: 2
    - title: "♻️ Refactoring"
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+'
      order: 3
    - title: "📚 Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+'
      order: 4
    - title: "🧪 Tests"
      regexp: '^.*?test(\([[:word:]]+\))??!?:.+'
      order: 5
    - title: "🔧 Build & CI"
      regexp: '^.*?(build|ci)(\([[:word:]]+\))??!?:.+'
      order: 6
    - title: "📦 Other Changes"
      regexp: '^.*?(style|revert)(\([[:word:]]+\))??!?:.+'
      order: 999
  filters:
    exclude:
      - '^.*?chore(\([[:word:]]+\))??!?:.+'
      - '^Merge'
      - '^merge'

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
